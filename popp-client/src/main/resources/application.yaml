spring:
  config:
    import:
      - "classpath:contact-based-scenarios.yaml"
      - "classpath:open-egk-scenarios.yaml"
      - "classpath:contact-less-scenarios.yaml"
  profiles:
    default: dev
    active: dev

server:
  port: 8081
  tomcat:
    max-http-form-post-size: 2147483648 # 2GB

springdoc:
  api-docs:
    enabled: true

popp-server:
  url: wss://popp-zeta-ingress:443/ws

connector:
  end-point-url: "http://ti-konnektor/cardservice"
  event-service-endpoint: http://localhost:80/eventservice
#  terminal-configuration:
#    context:
#      clientSystemId: "Client-System"
#      workplaceId: "Arbeitsplatz_01"
#      principalId: "Client007"

zeta:
  client:
    disableServerValidation: true
  authentication.smb:
    alias: "alias"
    keyfile: "/app/smcb_private.p12"
    password: "00"

card-reader:
  name:

virtual-card:
  image-file:
